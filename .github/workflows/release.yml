name: Release macOS App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
        
      - name: Build Executable
        run: |
          swift build -c release
          
      - name: Package macOS App Bundle
        run: |
          mkdir -p "dist/AgyFinder.app/Contents/MacOS"
          cp .build/release/agy-test1 "dist/AgyFinder.app/Contents/MacOS/AgyFinder"
          
          # Create Info.plist
          cat << 'EOF' > "dist/AgyFinder.app/Contents/Info.plist"
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0//EN">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>AgyFinder</string>
              <key>CFBundleIdentifier</key>
              <string>com.ljack.agy-finder</string>
              <key>CFBundleName</key>
              <string>Agy Finder</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>LSMinimumSystemVersion</key>
              <string>14.0</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          
          # Zip the bundle
          cd dist
          zip -r ../AgyFinder.zip AgyFinder.app
          
      - name: Create GitHub Release
        run: |
          gh release create "${{ github.ref_name }}" AgyFinder.zip \
            --title "Agy Finder ${{ github.ref_name }}" \
            --notes "Automated release of Agy Finder version ${{ github.ref_name }} containing the native macOS executable."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
